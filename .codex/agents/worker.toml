## Phase 3: Commit

```bash
git add -A
git commit -m "feat(<scope>): <description>

- <detail 1>
- <detail 2>

Task: <TASK_ID>"
```

Use conventional commits. Scope from task context.

**Mixed-model attribution — ONLY on a delegated commit (`DELEGATE: codex` AND
Codex wrote this commit's code).** Append these two trailers so `/flow-next:make-pr`
can credit both models. Put them in their own paragraph (blank line before the
`Task:` trailer) — `<model>` = `DELEGATE_MODEL`, `<effort>` = the per-run
`effective_effort` you ran (e.g. `gpt-5.5` / `medium`):

```bash
git commit -m "feat(<scope>): <description>

- <detail>

AI-Orchestrator: Claude
AI-Implementer: codex <DELEGATE_MODEL> (<effective_effort>)

Task: <TASK_ID>"
```

Do this ONLY when delegation actually produced the code. A standard in-session
commit (no delegation, or a `partial` you finished locally) carries **no**
`AI-Implementer` trailer — attribute honestly.

## Phase 4: Review (MANDATORY if REVIEW_MODE != none)

**If REVIEW_MODE is `none`, skip to Phase 5.** (When `DELEGATE: codex` is also set,
there is no independent impl-review gate, so Phase 5 below runs its own
verification on the delegated diff — `verification_summary` from Codex is NOT
trusted as the sole gate. See Phase 5.)

**If REVIEW_MODE is any non-`none` value (`rp`, `codex`, `copilot`, or `cursor`), you MUST invoke impl-review and receive SHIP before proceeding.**
(On a delegated task the impl-review SHIP gate is the independent CODE-QUALITY
check. The Phase 5 Verify block still runs in every mode — it is the authoritative
gate discipline (classify → tier-B or full gates → receipts → GATE_SKIPPED
evidence). It is no longer a duplicate cost: a green receipt or docs-only
classification resolves it in seconds, and when neither applies the full run is
genuinely needed — the reviewer read the diff, it never executed the suite.)

Use the Skill tool to invoke impl-review (NOT flowctl directly). If you're in a fresh shell, re-read the base first (`BASE_COMMIT=$(cat .flow/tmp/base_commit)`) so `--base` is populated:

```
/flow-next:impl-review <TASK_ID> --base $BASE_COMMIT --review=$REVIEW_MODE
```

Pass `--review=$REVIEW_MODE` so an explicit run-wide `work --review=<backend>` override reaches
the review — `REVIEW_MODE` holds the backend resolved for THIS task (the explicit run override if
given, else the **task-aware** backend from `review-backend "$TASK_ID"`, which already honors the
task's own `review:` override; see phases.md §3c). impl-review cannot see the worker prompt variable
otherwise, so passing it propagates the correct explicit-or-per-task precedence rather than
re-resolving from config. The skill still handles everything else:
- Scoped diff (BASE_COMMIT..HEAD, not main..HEAD)
- Receipt paths (don't pass --receipt yourself)
- Sending to reviewer (rp, codex, copilot, or cursor backend)
- Parsing verdict (SHIP/NEEDS_WORK/MAJOR_RETHINK)
- Fix loops until SHIP

**Foreground rule (do not background the review).** When the impl-review workflow shells a `flowctl <backend> …` review command, run it as one **blocking foreground** Bash call with a generous timeout (10 minutes; verdicts typically land in 1–7). Never launch it with `run_in_background` + a monitor — a background completion does not reliably resume your (subagent) context, and you would idle on an already-finished review. Blocking is safe: the call is bounded. (This does NOT apply to codex-delegation's `codex exec` launch in Phase 2 — that pattern deliberately backgrounds and polls a result file in foreground calls.)

**impl-review runs its OWN internal fix loop** (fix + re-review up to `MAX_REVIEW_ITERATIONS`, default 4). Do **NOT** wrap it in your own re-invoke-until-SHIP loop — that resets the skill's iteration counter every round and makes the cap unbounded in aggregate. Invoke it **once** and act on the **terminal verdict** it returns:

- **SHIP** → proceed to Phase 4.5.
- **NEEDS_WORK** → the skill already fixed + re-reviewed `MAX_REVIEW_ITERATIONS` times and findings still survive. Do NOT re-invoke. Escalate: under `SPEC_MODE` / autonomous, stop with a typed `BLOCKED: <surviving-findings summary>` (the escalation format below); interactively, surface the surviving findings to the caller.
- **MAJOR_RETHINK** → the design/approach is wrong, not patchable. Escalate `BLOCKED: DESIGN_CONFLICT` with the reviewer's rationale — never patch it, never re-invoke.

## Phase 4.5: Auto-capture on successful fix (after NEEDS_WORK → SHIP)

Only runs when **all** are true:
- `memory.enabled` is true (checked in Phase 1)
- The review cycle went through at least one NEEDS_WORK → SHIP transition (a clean first-pass SHIP captures nothing)
- The fix was non-trivial

**Skip capture when:**
- Review was a triage-skip fast-path (`receipt.mode == "triage_skip"`)
- Fix was mechanical (lockfile bump, typo, formatting-only)
- Same fingerprint (title + module + primary tag) was already captured in this session — skip the call entirely if you know it's a repeat; if you know the prior entry id, re-run with `memory add --update <id>` instead of creating a sibling

Otherwise, synthesize a bug-track entry from the NEEDS_WORK findings + the fix you applied:

```bash
FLOWCTL="$HOME/.codex/scripts/flowctl"
[ -x "$FLOWCTL" ] || FLOWCTL=".flow/bin/flowctl"

cat > /tmp/memory-body.md <<'EOF'
## Problem
<one-paragraph on what went wrong — surfaced by the review>

## What Didn't Work
<first attempt / naive approach, if relevant>

## Solution
<what actually fixed it — cite file:line when possible>

## Prevention
<what would catch this earlier — pre-commit check, test pattern, lint rule>
EOF

$FLOWCTL memory add \\
  --track bug \\
  --category <inferred> \\
  --title "<one-line summary, <=80 chars>" \\
  --module "<primary-affected-file-or-module>" \\
  --tags "<tag1>,<tag2>" \\
  --symptoms "<one-line — what went wrong>" \\
  --root-cause "<one-line — what caused it>" \\
  --body-file /tmp/memory-body.md
```

`memory add` always creates unless you pass explicit `--update <id>` (fn-113). The JSON response always includes `matches` (scored retrieval signal): on high overlap, either re-run with `--update <match-id>` to fold into the existing entry, or accept the create. Moderate overlap creates a new entry with `related_to` cross-reference. The worker owns the update-vs-create judgment.

Optional flags with sensible defaults (omit unless you need to override):
- `--problem-type` — derived from `--category` (`runtime-errors` → `runtime-error`, `build-errors` → `build-error`, `test-failures` → `test-failure`; other categories default to `build-error`). Pass explicitly only when the derived default is wrong.
- `--resolution-type` — defaults to `fix` (alternatives: `workaround`, `documentation`, `refactor`).
- `--symptoms` — defaults to the title.
- `--root-cause` — defaults to `(unspecified)`; populate it for useful entries.

### Inferring category

Map the review's primary issue to one of the 8 bug-track categories:

| Review signal | Category |
|---|---|
| build failed, import missing, compile error | `build-errors` |
| test suite failures, assertion mismatch | `test-failures` |
| null deref, wrong value, crash at runtime | `runtime-errors` |
| N+1 query, slow request, memory leak | `performance` |
| auth bypass, SQL injection, secret leak | `security` |
| API contract mismatch, schema drift, wire format | `integration` |
| data corruption, partial write, migration error | `data` |
| layout broken, wrong color, a11y | `ui` |

When ambiguous, pick the most specific that fits. If truly none fit, default to `build-errors` (the migration classifier does the same). Overlap detection will merge with a similar past entry if one exists.

If capture fails (memory disabled mid-run, flowctl error, etc.), log and continue — never block task completion on memory capture.

