## Phase 1: Re-anchor (CRITICAL - DO NOT SKIP)

Use the FLOWCTL path and IDs from your prompt. ONE call fetches the whole re-anchor bundle:

```bash
<FLOWCTL> anchor <TASK_ID> --md
```

The bundle carries, verbatim and in fixed order: the task record + body (`show`/`cat`), the parent spec record + body, `git status` / `git log -5 --oneline` / current branch, `memory.enabled`, the glossary, the memory index (when memory is enabled), and each dependency's id/title/status/done summary. If a section reports `(section unavailable: ...)`, run that one command directly — the bundle is fail-open.

**The bundle is a FLOOR, not a ceiling.** It replaces the discrete Phase-1 reads — it does not cap your context. Query further whenever useful:

```bash
<FLOWCTL> memory search "<keyword>" --json   # by task keyword / module / tag
<FLOWCTL> memory read <entry-id>             # full entry body
```
Narrow with `--track bug|knowledge`, `--category <cat>`, `--module <path>`, or `--tags "a,b"` when you have context. Read any file, run any read-only git command — everything the discrete reads allowed remains available.

Legacy `.flow/memory/pitfalls.md` / `conventions.md` / `decisions.md` still surface via the bundle's memory index and `memory search` (track=`legacy`) until `flowctl memory migrate` has run.

From the bundle's memory index, look for entries relevant to your task's technology/domain/module — then `memory search` / `memory read` the ones that matter.

**Glossary (canonical vocabulary):** the bundle's glossary section is `flowctl glossary list --json` verbatim (husk-aware: `total_terms == 0` → skip silently). When `total_terms > 0`, match each entry's `term` + `avoid` aliases against the task title/description (case-insensitive, whitespace-collapsed) and keep ONLY the matching entries' definitions — they are the canonical meanings for naming and concepts in this task; implementations must not contradict them. Never pull the whole glossary into context. No glossary, a husk, or zero matches → skip, zero change.

Parse the spec carefully. Identify:
- Acceptance criteria
- Dependencies on other tasks
- Technical approach hints
- Test requirements
- Quick commands from parent spec (run these for verification)

**Baseline check (before any edit — run the spec's Quick commands, record the result):**
```bash
# FOREGROUND RULE: run each gate suite as ONE blocking foreground Bash call (timeout 600s).
# NEVER run_in_background + monitor - a background completion does not resume a subagent context.
# Run the parent spec's Quick commands (the test/lint/build listed above) to establish
# the pre-edit baseline, and RECORD it so a task-CAUSED failure is distinguishable from
# an INHERITED one at review time (the impl-review "Tests" criterion judges blind otherwise):
#   GREEN baseline → proceed.
#   RED baseline (a Quick command fails BEFORE you touch anything) → do NOT silently
#     proceed: record `baseline: red (<cmd> failed pre-edit)` in the Phase-5 done evidence,
#     then either fix the tooling if trivial, or escalate `BLOCKED: TOOLING_FAILURE`.
#   No Quick commands defined → record `baseline: none` and proceed.
# Never treat a pre-existing red baseline as your own success or your own failure.
# When the repo ships a parallel full-suite entrypoint (flow-next itself: `python3 scripts/run_tests_parallel.py`,
# serial fallback `--serial`), specs list it as the full-suite Quick command; its exact string is the receipt identity.
# Before each full gate command from the Quick commands, map it to a `(gate_id, exact command string)`
# pair (`unittest` for the test suite, `smoke` for a smoke script) and first run:
#   <FLOWCTL> gate check --gate <gate_id> --command "<cmd>"
# Exit 0 means SKIP that full command: record
#   GATE_SKIPPED:<gate_id>:green-receipt <sha8> - baseline reused from prior post-gate pass
# using the `<sha8>` from the `HONORED` output (or `--json` `.sha8`). A reused green receipt
# counts as `baseline: green` via receipt. On exit 1 or 2+, run the full command exactly as
# today: fail closed, and never treat a check error as a skip. Lint/format commands are unchanged:
# always run, never receipted, never skipped.
```

**Suite-output capture rule (Baseline and Verify):** green observation is the command exit code, not a scraped output line; re-running a suite merely to observe its result is forbidden. Run each suite once with output captured to a log (for example, `<cmd> > "$SUITE_LOG" 2>&1; suite_rc=$?; echo "suite_rc=$suite_rc"`), then read any summary from that log. Gate suites run as ONE blocking FOREGROUND Bash call with an explicit generous timeout (600s) - never `run_in_background` + a monitor: a background completion does not reliably resume a subagent context (the same Foreground rule review calls carry, applied to gate runs). In this Baseline block, apply that capture when an exit-1/2+ gate check requires the full command.

**Capture the base commit at Phase-1 end — BEFORE any edit — and PERSIST it to a file** (bash variables do NOT survive across separate tool-call Bash blocks; a later block reading a stale `$BASE_COMMIT` would expand to `..HEAD` and record blank/empty evidence):
```bash
mkdir -p .flow/tmp
BASE_COMMIT=$(git rev-parse HEAD)
printf '%s\\n' "$BASE_COMMIT" > .flow/tmp/base_commit
echo "BASE_COMMIT=$BASE_COMMIT (persisted to .flow/tmp/base_commit — gitignored)"
```
`BASE_COMMIT` scopes the impl-review diff (Phase 4), anchors delegation git-ownership (Phase 2), and is recorded with the full commit list in the done evidence (Phase 5). **In EVERY later Bash block that references it, re-read from the file first: `BASE_COMMIT=$(cat .flow/tmp/base_commit)`** — the Phase-1 assignment does not carry across tool calls.

## Phase 1.5: Pre-implementation Investigation

**If the task spec contains `## Investigation targets`:**

1. **Read every Required file** listed before writing any code. Note:
   - Patterns to follow (function signatures, naming, structure)
   - Constraints discovered (validation rules, type contracts, env requirements)
   - Anything surprising that might affect your approach

**If the task spec contains `## Design context`:**

Read `DESIGN.md` (path noted in design context section). Focus on:
- Color tokens referenced in the task's design context
- Component patterns relevant to what you're building
- Do's and Don'ts that apply to this specific UI change

Use design tokens from DESIGN.md, not hard-coded values. If a color, spacing, or component pattern is in the design system, reference it rather than inventing new values.

If DESIGN.md is missing or the path is wrong, note it and proceed — design context is advisory, not blocking.

2. **Similar functionality search** — before writing new code:
   ```bash
   # Search for functions/modules that do similar things
   # Use terms from the task description + acceptance criteria
   grep -r "<key domain term>" --include="*.ts" --include="*.py" -l src/
   ```
   If similar functionality exists, pick one:
   - **Reuse**: Use the existing code directly
   - **Extend**: Modify existing code to support the new case
   - **New**: Create new code (justify why existing isn't suitable)

   Report what you found:
   ```
   Similar code search:
   - Found: `validateEmail()` in src/utils/validation.ts:23 — reusing
   - Found: `src/routes/users.ts:45` — following this pattern
   - No existing rate limiter found — creating new
   ```

3. Read **Optional** files as needed during implementation.

4. Continue to Phase 2 only after investigation is complete.

## Phase 2: Implement

**`BASE_COMMIT` was captured at Phase-1 end (before any edit).** You'll pass it to impl-review so it only reviews THIS task's changes. (It is also the git-ownership anchor for the delegation path below.)

**Delegation hook — ONLY when `DELEGATE: codex` is in your prompt.** If `DELEGATE`
is absent or `local`, skip this entire hook and implement in-session as usual
(the rest of Phase 2 is unchanged). When `DELEGATE: codex` is set, the host has
already run the pre-flight gates and one-time consent — your job is to delegate
THIS task's implementation to `codex exec`:

**Thin-task valve (you own the final call - the host's `DELEGATE:` flags are
provisional).** Read the task file first: if it does not name its files and its
acceptance, OR the allowed-file list is EMPTY after removing orchestrator-owned
artifacts (the codex mirror, `.flow/bin` dual-copies), do NOT delegate -
implement in-session as a standard task (emit no `DELEGATION_*` lines; the
host's counter stays untouched - not a failure, not a strike).

1. Read `$HOME/.codex/skills/flow-next-work/references/codex-delegation.md`
   — the "Invocation / result schema / background-launch+poll / per-run effort"
   section is the mechanics; the classification / safety / rollback sections (and
   the `flowctl codex classify-result` / `rollback-plan` helpers) govern what you
   do with the result.
2. Build the scratch dir `.flow/tmp/codex-<task-id>/`, write `result-schema.json`,
   fill the fixed path-handoff template's 3 slots (task id, spec id, allowed-file
   list) into `prompt-batch-1.md` - one run per task, nothing else composed. The
   id slots take the CANONICAL ids from `flowctl show <TASK_ID> --json` (`.id` /
   `.spec`), never a short alias - an alias-filled `.flow/tasks/<task-id>.md`
   path does not exist. Pick the per-run effort (floored at
   `DELEGATE_EFFORT_FLOOR`), and **launch `codex exec` via the Bash
   `run_in_background` tool parameter** (NOT shell `&`) using `DELEGATE_MODEL` +
   <!-- DELEGATION-ONLY exception: this is the ONE sanctioned background codex launch (result polled via foreground file reads). REVIEW commands are NEVER backgrounded - see the Foreground rule in Phase 3.5. -->
   the **literal** sandbox flag inlined from `DELEGATE_SANDBOX` (yolo →
   `--dangerously-bypass-approvals-and-sandbox`, full-auto → `-s workspace-write`).
   Inline the literal flag — NOT a `$SANDBOX_FLAG` variable: ralph-guard inspects
   the raw pre-expansion command and only allowlists the literal sandbox flags.
3. **Poll the result file in separate FOREGROUND Bash calls** (non-empty AND
   `jq -e .` parseable) until DONE. When the background `codex exec` task COMPLETES,
   **capture its exit code as `CODEX_EXIT`** (the `run_in_background` task surfaces
   it on completion — the poll-the-result-file loop is only a readiness check). A
   non-zero `codex exec` exit MUST drive `cli_failure → rollback_and_disable` — so
   never guess `0`. Then classify + cross-check + enforce git/`.flow` ownership
   against `BASE_COMMIT`, and either commit (Phase 3), finish locally, or
   scoped-rollback per the reference's "Orchestration split / one run per task / result
   classification / safety" section. The concrete mechanics (all deterministic
   flowctl, never re-derived in prose):

   ```bash
   # CODEX_EXIT = the background codex exec task's exit code (from the
   # run_in_background task completion — NOT defaulted to 0). exit≠0 = cli_failure.
   # Classify (the 5-row table — exit≠0 always wins):
   CLASS_JSON="$($FLOWCTL codex classify-result \\
     --result "$SCRATCH/result-batch-1.json" --exit "$CODEX_EXIT" --json)"
   ACTION="$(printf '%s' "$CLASS_JSON" | jq -r '.action')"

   # Re-read BASE_COMMIT — bash vars do not survive across tool-call Bash blocks;
   # an empty ref here would wrongly force-rollback a SUCCESSFUL delegated run and
   # run `git reset --mixed ""`.
   BASE_COMMIT=$(cat .flow/tmp/base_commit)

   # Git-ownership assertion — a moved HEAD means Codex committed (yolo can run
   # git); that is ALWAYS an enforcement failure → force a rollback + disable.
   if [ "$(git rev-parse HEAD)" != "$BASE_COMMIT" ]; then
     ACTION=rollback_and_disable
   fi

   # ROLLBACK — tracked revert + scoped untracked cleanup. The WHOLE block runs
   # ONLY on a rollback action: a `completed`/`partial` success KEEPS Codex's new
   # files for Phase 3 to commit (gating this is load-bearing — an unconditional
   # clean would delete a successful task's new files).
   if [ "$ACTION" = rollback ] || [ "$ACTION" = rollback_and_disable ]; then
     # 1. Revert TRACKED files AUTHORITATIVELY from BASE_COMMIT — never from the
     #    index, the result JSON, or files_modified. `--mixed` un-commits AND
     #    unstages (a yolo commit / `git add` can't survive `checkout`'s
     #    index-restore); the tracked checkout reverts the worktree from BASE.
     git reset --mixed "$BASE_COMMIT"
     git checkout -- . ':(exclude).flow'                 # excludes host-owned .flow/
     # 2. RE-SNAPSHOT untracked AFTER the reset. A file Codex *committed* as an add
     #    only becomes untracked once `--mixed` un-commits it, so the pre-reset
     #    post-snapshot would miss it. Capturing here includes it in `post − pre`.
     git ls-files --others --exclude-standard -z > "$SCRATCH/post-untracked.txt"
     # 3. Scoped UNTRACKED cleanup — NEVER bare `git clean`:
     $FLOWCTL codex rollback-plan --repo-root . \\
       --preexisting-untracked-file "$SCRATCH/pre-untracked.txt" \\
       --post-untracked-file "$SCRATCH/post-untracked.txt" --json > "$SCRATCH/plan.json"
     # MANDATORY non-empty guard: an empty rollback_paths would degrade
     # `git clean -fd --` into a BARE clean wiping ALL untracked output.
     # `--print0` emits the sanitized paths NUL-delimited (whitespace/newline-safe):
     if [ "$(jq '.rollback_paths | length' "$SCRATCH/plan.json")" -gt 0 ]; then
       $FLOWCTL codex rollback-plan --repo-root . \\
         --preexisting-untracked-file "$SCRATCH/pre-untracked.txt" \\
         --post-untracked-file "$SCRATCH/post-untracked.txt" --print0 \\
         | xargs -0 git clean -fd --
     fi
     #   → feeds ONLY the sanitized rollback_paths (never a pre-existing untracked
     #     file, never a `.flow/**` path, never an empty/bare `git clean`).
   fi
   ```

   - `pre-untracked.txt` is captured with `git ls-files --others --exclude-standard -z`
     BEFORE `codex exec`; the post snapshot is (re)captured INSIDE the rollback
     branch AFTER the `--mixed` reset (so a file Codex committed-as-add is seen).
   - Snapshot non-scratch `.flow/` before delegating; if Codex mutated any
     non-scratch `.flow/` path, restore those paths from the snapshot + disable
     delegation (the rollback never touches `.flow/**`, so this is the only undo).
   - Before committing a `completed` result, run the `git status --porcelain` ∩
     `files_modified` trust cross-check; a mismatch downgrades to partial/failed.

