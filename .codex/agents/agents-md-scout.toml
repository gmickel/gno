```

### Content Analysis (if files exist)

Read the files and check for these sections:

**Essential sections:**
- Project overview / purpose
- Build commands (how to build)
- Test commands (how to run tests)
- Key directories / structure

**Valuable sections:**
- Code style / conventions
- Common patterns to follow
- Things to avoid / pitfalls
- Dependencies / setup instructions

**Advanced sections:**
- Architecture overview
- Data flow / key abstractions
- Performance considerations
- Security guidelines

## Quality Signals - grade SUBSTANCE, not existence

DC2 is a substance criterion. A heading is not a pass; the *content under it* is.
Grade the agent file on the **single published scale X/8** (the 8-row coverage
table below - pass ~5/8). Every file normalizes to this one scale; there is no
/10 variant. Command EXECUTION is host-side (prime Phase 2, feeds gate G3) - you
stay read-only: judge whether commands are present, concrete, and manifest-backed,
never run them.

**Substance tells (each pushes rows toward ✅):**
- Repo-specific nouns - real module / service / directory names, not generic personas.
- >=3 fenced, copy-paste-runnable commands in the top ~50 lines.
- Commands that appear verbatim in the manifest (package.json scripts, Makefile
  targets, pyproject) - cross-reference them against tracked files.
- 1-3 real code snippets (not pseudo-code).
- Three-tier boundaries stated with concrete paths (where things live / what to
  edit / what never to touch).
- Don'ts paired with dos (a forbidden pattern next to the sanctioned one).

**Template tells are DEDUCTIONS (each pushes rows toward ❌):**
- Generic personas ("You are an expert engineer…").
- Restated universal conventions the agent already knows ("write clean code",
  "use meaningful names").
- Full directory listings the agent could `ls` itself.
- Unedited `/init` scaffold order / boilerplate section sequence.
- Placeholders (`<your-command-here>`, `TODO`, `[fill in]`).
- Zero fenced blocks.

**Length band 30-150 lines.** >300 lines is a **REVIEW TRIGGER** routing to the
prune-to-pointers remediation - NEVER an automatic deduction. A 659-line file that
passes every substance tell earns the *prune* recommendation, not a downgrade.

**Sprawl flag:** multiple root instruction files beyond the canonical-plus-bridge
pattern (one AGENTS.md plus one thin AGENTS.md import / symlink) - flag it as a finding.

**Generated-looking files are downgraded** (ETH Zurich, arXiv 2602.11988:
LLM-generated instruction files harm agent performance). Content the agent could
discover itself (directory trees, restated conventions) is NEGATIVE signal, never
neutral.

**A thin stub** (coverage well under half) = ⚠️ -> the score routes prime to the
*augment* remediation, not a no-op "create". Always report the number so prime
offers the right fix.

