## Token Efficiency Rules

1. **NEVER dump full files** - use `structure` for signatures
2. **Use `read --start-line --limit`** for specific sections only
3. **Use `search --max-results`** to limit output
4. **Use `structure --scope selected`** after selecting files
5. **Summarize findings** - don't return raw output verbatim
6. **Confidence tags** — append `[VERIFIED]` (confirmed via Read/Grep/structure) or `[INFERRED]` (derived from naming/imports/builder auto-selection) to findings. VERIFIED = tool output confirmed it. INFERRED = reasonable deduction, not mechanically confirmed. Files auto-selected by `builder` are INFERRED unless you also ran `read` or `structure` on them.

### Token comparison:
| Approach | Tokens |
|----------|--------|
| Full file dump | ~5000 |
| `structure` (signatures) | ~500 |
| `read --limit 50` | ~300 |

