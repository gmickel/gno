name: Windows Packaging

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/windows-packaging.yml"
      - "desktop/electrobun-shell/**"
      - "src/cli/commands/doctor.ts"
      - "src/store/**"
      - "docs/INSTALLATION.md"
      - "docs/WINDOWS.md"
      - "docs/DESKTOP-BETA-ROLLOUT.md"
      - "README.md"

jobs:
  package-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set TEMP to runner temp
        shell: pwsh
        run: |
          echo "TEMP=${{ runner.temp }}" >> $env:GITHUB_ENV
          echo "TMP=${{ runner.temp }}" >> $env:GITHUB_ENV

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install shell dependencies
        working-directory: desktop/electrobun-shell
        run: bun install --frozen-lockfile

      - name: Build desktop shell
        working-directory: desktop/electrobun-shell
        run: bun run build

      - name: Verify packaged runtime
        working-directory: desktop/electrobun-shell
        run: bun scripts/verify-packaged-runtime.ts

      - name: Upload packaged runtime proof
        uses: actions/upload-artifact@v7
        with:
          name: packaged-runtime-proof-windows
          path: |
            desktop/electrobun-shell/artifacts/*.json
