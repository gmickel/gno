name: Publish

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Actually publish to npm (false = dry run)"
        required: false
        default: "false"
        type: boolean
  push:
    tags:
      - "v*"

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # No continue-on-error - releases must pass on all platforms

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache Bun's global package cache
      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            bun-cache-${{ runner.os }}-

      # Windows: Move TEMP to D: drive for faster I/O
      - name: "Set TEMP to D: drive (Windows)"
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "D:/Temp" | Out-Null
          echo "TEMP=D:/Temp" >> $env:GITHUB_ENV
          echo "TMP=D:/Temp" >> $env:GITHUB_ENV

      - name: Install SQLite (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install sqlite3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint & Typecheck
        run: bun run lint:check

      - name: Test (Unix)
        if: matrix.os != 'windows-latest'
        run: bun test | cat
        env:
          CI: "true"

      - name: Test (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: bun test --concurrency 1
        env:
          CI: "true"

  package-windows-desktop:
    needs: test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: "Set TEMP to D: drive (Windows)"
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "D:/Temp" | Out-Null
          echo "TEMP=D:/Temp" >> $env:GITHUB_ENV
          echo "TMP=D:/Temp" >> $env:GITHUB_ENV

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install shell dependencies
        working-directory: desktop/electrobun-shell
        run: bun install --frozen-lockfile

      - name: Build desktop shell
        working-directory: desktop/electrobun-shell
        run: bun run build

      - name: Verify packaged runtime
        working-directory: desktop/electrobun-shell
        run: bun scripts/verify-packaged-runtime.ts

      - name: Archive Windows desktop build
        id: archive_windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "desktop/electrobun-shell/artifacts" | Out-Null
          $buildDir = Get-ChildItem "desktop/electrobun-shell/build" -Directory | Select-Object -First 1
          if (-not $buildDir) { throw "No Windows desktop build directory found" }
          $zipPath = "desktop/electrobun-shell/artifacts/gno-desktop-beta-windows-x64.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path (Join-Path $buildDir.FullName '*') -DestinationPath $zipPath -Force
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT

      - name: Upload packaged runtime proof
        uses: actions/upload-artifact@v7
        with:
          name: packaged-runtime-proof-windows
          path: |
            desktop/electrobun-shell/artifacts/*.json

      - name: Upload Windows desktop package
        uses: actions/upload-artifact@v7
        with:
          name: gno-desktop-beta-windows-release
          path: ${{ steps.archive_windows.outputs.zip_path }}

  package-macos-desktop:
    needs: test
    runs-on: macos-15
    environment: release

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Import Developer ID certificate
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/apple-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/release.keychain-db"

          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Configure notarytool profile
        env:
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_API_KEY_P8: ${{ secrets.APPLE_NOTARY_API_KEY_P8 }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          printf "%s" "$APPLE_NOTARY_API_KEY_P8" > "$KEY_PATH"
          xcrun notarytool store-credentials notarytool-profile \
            --key "$KEY_PATH" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID"

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install shell dependencies
        working-directory: desktop/electrobun-shell
        run: bun install --frozen-lockfile

      - name: Build signed/notarized macOS desktop release
        working-directory: desktop/electrobun-shell
        env:
          APPLE_SIGNING_IDENTITY: ${{ vars.APPLE_SIGNING_IDENTITY }}
          NOTARYTOOL_PROFILE: notarytool-profile
          ELECTROBUN_BUILD_DIR: ${{ github.workspace }}/desktop/electrobun-shell/build
          ELECTROBUN_ARTIFACT_DIR: ${{ github.workspace }}/desktop/electrobun-shell/artifacts
        run: bun run release:macos

      - name: List macOS release artifacts
        run: |
          set -euo pipefail
          find "$GITHUB_WORKSPACE/desktop/electrobun-shell/artifacts" -maxdepth 3 -type f -print | sort

      - name: Upload packaged runtime proof
        uses: actions/upload-artifact@v7
        with:
          name: packaged-runtime-proof-macos
          if-no-files-found: error
          path: |
            ${{ github.workspace }}/desktop/electrobun-shell/artifacts/*.json

      - name: Upload macOS desktop package
        uses: actions/upload-artifact@v7
        with:
          name: gno-desktop-beta-macos-release
          if-no-files-found: error
          path: |
            ${{ github.workspace }}/desktop/electrobun-shell/artifacts/release-macos/*.zip
            ${{ github.workspace }}/desktop/electrobun-shell/artifacts/release-macos/*.dmg
            ${{ github.workspace }}/desktop/electrobun-shell/artifacts/release-macos/*.json

  pack-test:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CSS
        run: bun run build:css

      - name: Pack
        run: npm pack

      - name: Test packed tarball
        run: |
          # Install from tarball globally (use npm - bun has issues with local tarballs)
          npm install -g ./gmickel-gno-*.tgz

          # Verify CLI works
          gno --version
          gno --help

          # Run doctor (may fail if no index, but should at least run)
          gno doctor --json || true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: gmickel-gno-*.tgz

  publish:
    needs: pack-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.publish == true
    permissions:
      contents: read
      id-token: write # Required for npm trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v6

      # Need Node.js 24+ for npm OIDC support (npm >= 11.5.1)
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CSS
        run: bun run build:css

      - name: Publish to npm
        run: npm publish --provenance --access public
        # No token needed - uses OIDC trusted publishing

  release:
    needs: [publish, package-windows-desktop, package-macos-desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download Windows desktop package
        uses: actions/download-artifact@v5
        with:
          name: gno-desktop-beta-windows-release
          path: release-assets/windows

      - name: Download macOS desktop package
        uses: actions/download-artifact@v5
        with:
          name: gno-desktop-beta-macos-release
          path: release-assets/macos

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract section between this version and next version header (or EOF)
          NOTES=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") { found=1; next }
            }
            found { print }
          ' CHANGELOG.md)
          # Handle multi-line output
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            release-assets/windows/*.zip
            release-assets/macos/*.zip
            release-assets/macos/*.dmg
